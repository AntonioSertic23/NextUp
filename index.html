<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NextUp</title>

    <meta
      name="description"
      content="Track TV shows and episodes — watchlist, discover, stats, optional Trakt sync."
    />
    <meta name="theme-color" content="#15161b" />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NextUp" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/img/pwa-icon-192.png" />
    <link rel="apple-touch-icon" href="/img/pwa-icon-192.png" />

    <!-- Prevent caching of authenticated pages -->
    <meta http-equiv="Cache-Control" content="no-store" />

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <!--
    The body starts without the "authenticated" class.
    Content (header, main, footer) is hidden via CSS until app.js
    confirms the session is valid and adds the class. This prevents
    a flash of the app shell when navigating back after logout.
  -->
  <body>
    <!-- Header section: navbar will be loaded dynamically -->
    <header></header>

    <!-- Main content area: pages will be rendered here via JS -->
    <main></main>

    <!-- Footer section: can contain footer info, loaded dynamically -->
    <footer></footer>

    <!-- Episode Info Modal: exists in DOM, hidden by default -->
    <div id="episode-info-modal-overlay">
      <div id="episode-info-modal">
        <div class="modal-row">
          <div class="modal-img">
            <img src="" alt="Episode screenshot" class="modal-img-tag" />
          </div>
          <div class="modal-details">
            <div class="episode-info-info"></div>
            <button class="modal-mark-btn mark-watched"></button>
            <div class="episode-info-date"></div>
            <div class="episode-info-overview"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main JS module: handles routing, page rendering, API calls -->
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
