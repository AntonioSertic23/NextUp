<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - NextUp</title>

    <meta http-equiv="Cache-Control" content="no-store" />

    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body class="login-page">
    <main>
      <div class="auth-container">
        <div class="auth-card">
          <h1 class="auth-title">NextUp</h1>
          <p class="auth-subtitle">Track your TV shows</p>

          <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Login</button>
            <button class="auth-tab" data-tab="register">Register</button>
          </div>

          <div class="auth-content">
            <!-- Login Form -->
            <form
              id="login-form"
              class="auth-form-content active-form"
              novalidate
            >
              <div class="input-group">
                <input
                  type="email"
                  id="login-email"
                  placeholder="Email"
                  autocomplete="email"
                  required
                />
              </div>
              <div class="input-group">
                <input
                  type="password"
                  id="login-password"
                  placeholder="Password"
                  autocomplete="current-password"
                  required
                />
                <button
                  type="button"
                  class="password-toggle"
                  aria-label="Show password"
                >
                  <svg
                    class="eye-icon"
                    viewBox="0 0 24 24"
                    width="20"
                    height="20"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                  <svg
                    class="eye-off-icon"
                    viewBox="0 0 24 24"
                    width="20"
                    height="20"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    style="display: none"
                  >
                    <path
                      d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                    />
                    <line x1="1" y1="1" x2="23" y2="23" />
                  </svg>
                </button>
              </div>
              <button type="submit" class="auth-submit-btn">
                <span class="btn-text">Login</span>
                <span class="btn-spinner" style="display: none"></span>
              </button>
              <div id="login-message" class="auth-message"></div>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form-content" novalidate>
              <div class="input-group">
                <input
                  type="email"
                  id="register-email"
                  placeholder="Email"
                  autocomplete="email"
                  required
                />
              </div>
              <div class="input-group">
                <input
                  type="password"
                  id="register-password"
                  placeholder="Password"
                  autocomplete="new-password"
                  required
                />
                <button
                  type="button"
                  class="password-toggle"
                  aria-label="Show password"
                >
                  <svg
                    class="eye-icon"
                    viewBox="0 0 24 24"
                    width="20"
                    height="20"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                  <svg
                    class="eye-off-icon"
                    viewBox="0 0 24 24"
                    width="20"
                    height="20"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    style="display: none"
                  >
                    <path
                      d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                    />
                    <line x1="1" y1="1" x2="23" y2="23" />
                  </svg>
                </button>
              </div>
              <div class="input-group">
                <input
                  type="password"
                  id="register-password-confirm"
                  placeholder="Confirm Password"
                  autocomplete="new-password"
                  required
                />
              </div>
              <button type="submit" class="auth-submit-btn">
                <span class="btn-text">Create account</span>
                <span class="btn-spinner" style="display: none"></span>
              </button>
              <div id="register-message" class="auth-message"></div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="./src/login.js"></script>
  </body>
</html>
